services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: rps
      POSTGRES_PASSWORD: rps
      POSTGRES_DB: rps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rps -d rps"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://rps:rps@postgres:5432/rps
      REDIS_URL: redis://redis:6379/0
      COOKIE_SECURE: "false"
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_WS_BASE: ws://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
